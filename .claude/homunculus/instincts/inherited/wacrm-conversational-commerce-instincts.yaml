# Wacrm Conversational Commerce Workflow Add Feature With Api Endpoints And Migrations

## Action

Follow the add-feature-with-api-endpoints-and-migrations workflow:
1. Create new API route files under src/app/api/feature/route.ts
2. Update or add related components under src/components/settings/
3. Implement supporting library code under src/lib/
4. Update type definitions in src/types/index.ts
5. Add a new database migration file under supabase/migrations/

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/app/api/*/route.ts, src/components/settings/*.tsx, src/lib/**/*.ts

